[content]
description = "Post-v0.6.0 cleanup pass over sglbench/: remove dead code, deduplicate repeated helpers, and simplify over-complex logic without changing observable behavior. Targets identified by survey: duplicated JSONL parsing (objective.load_results vs sglang_adapter.parse_result_jsonl), repeated json.dumps-write pattern (generate.py, run.py, objective.py), near-identical subprocess wrapper stubs and BenchClient._run bodies in sglang_adapter.py, slug-helper duplication and unused @runtime_checkable decorators in measure.py, and accuracy-gating conditionals embedded in driver.run_search. No behavior change; all existing tests must pass unmodified."
notes = ["Do not remove @runtime_checkable from BenchClient/ServerSession/ServerManager: tests assertIsInstance against these protocols, so the decorators are load-bearing; only AccuracyEvaluator's was unused"]

