[govctl]
id = "WI-2026-06-09-010"
title = "C-QUALITY-GATE: accuracy acceptance gate — schema, per-config eval recording, frontier eligibility filter, staged pin enforcement"
status = "done"
created = "2026-06-09"
started = "2026-06-09"
completed = "2026-06-09"
refs = ["RFC-0001"]

[content]
description = "Implement RFC-0001:C-QUALITY-GATE (v0.3.0). A per-branch accuracy acceptance gate (dataset + threshold, defined before the search) excludes failing configs from the acceptable results (the Pareto frontier) at every search stage, while their measurements are still recorded and flagged (quality_pass) in the same results stream for speed/quality trade-off inspection. Accuracy is evaluated once per launched config via an AccuracyEvaluator protocol (abstracted like BenchClient, no GPU in tests) and stamped onto each inner-point record."

[[content.acceptance_criteria]]
text = "govctl check passes"
