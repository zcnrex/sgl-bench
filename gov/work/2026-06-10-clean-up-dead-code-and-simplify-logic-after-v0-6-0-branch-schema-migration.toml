[content]
description = "Behavior-preserving cleanup of the argsearch package after the v0.6.0 within-checkpoint Branch migration and the compare/inspect view additions. Several iterations left small duplications and over-complex arms; consolidate them so the codebase reads cleanly without changing any RFC-0001 observable behavior. Scope: (1) deduplicate cross-module default constants (DEFAULT_OUT_DIR in generate.py/run.py; DEFAULT_RESULTS in compare.py/objective.py) into a single shared definition; (2) factor the repeated branch-baseline-score + gate retrieval pattern in objective.py (build_frontier / gate_failed_pins / main) into one helper; (3) simplify redundant conditional arms (run.py limit guard, run.py baseline+spot membership reconstruction, schema.py Branch._validate duplicate set(names) scans); (4) cache branch.branch_keys() out of the generate.py loops. Out of scope: the precision_branches backward-compat alias (schema.py:319) is intentionally kept and tested — do not remove."

