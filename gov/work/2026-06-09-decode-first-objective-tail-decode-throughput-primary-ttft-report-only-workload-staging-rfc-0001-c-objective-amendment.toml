[content]
description = "Refine the optimization objective per the amended RFC-0001:C-OBJECTIVE + new C-WORKLOAD-STAGING: decode latency/throughput is the first-class objective and the only SLO gate (per-token/ITL); TTFT becomes a reported, non-gating metric. Throughput = steady-state/tail decode throughput (bench last_gen_throughput) tagged with context length, not OSL-averaged output_throughput. Short-OSL workloads drive the search (fast iter); long-OSL reserved for final-report characterization."
notes = ["Two residual deviations for the future C-SEARCH-STRATEGY stage orchestrator: (1) run_search is role-agnostic — it does not pin the search to workload_points(role='iter'), so the C-WORKLOAD-STAGING ban on long-output workloads during OFAT/grid must be enforced by the orchestrator/caller; (2) bench_one_batch_server exposes only the single tail decode step (decode_window_steps=1), not the multi-step steady-state window C-OBJECTIVE specifies — a true window (and true p95 TTFT) needs the genai-bench transport, reconciled per C-BASELINE-ANCHOR."]

[[content.acceptance_criteria]]
