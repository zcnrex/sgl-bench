[content]
description = "Drive the search per RFC-0001:C-LOOP-STRUCTURE: an outer loop over generator ConfigPoints that relaunches the server once per restart-required config, and an inner loop that sweeps the workload axes (isl/osl pairs x concurrency) against that single live server without relaunching. Workload axes must not be expanded into the outer loop. The inner loop invokes the WI-004 measurement unit per workload point. Server lifecycle is behind a launch/health/shutdown interface so orchestration is unit-testable without a GPU."

