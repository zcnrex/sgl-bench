[content]
description = "Add BenchServingClient (BenchClient protocol) wrapping sglang.bench_serving as a richer frontier transport: drives N requests at a target concurrency and reports TTFT/ITL percentiles. Per C-OBJECTIVE, map decode per-token latency from ITL (median/p95_itl_ms) and derive steady-state decode throughput from ITL (concurrency*1000/median_itl_ms), NOT the blended output_throughput. Selectable in argsearch-run via --transport. Reconcile TTFT vs bench_one_batch_server on the B300 before relying on it (C-BASELINE-ANCHOR)."
notes = ["bench_serving needs --random-range-ratio 1.0 to fix input length to isl (C-OBJECTIVE comparability); decode/ITL reconcile to ~0.1% vs bench_one_batch_server, TTFT to ~8% (report-only)."]

