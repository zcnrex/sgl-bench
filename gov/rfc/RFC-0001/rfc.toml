[[changelog]]
version = "0.5.0"
date = "2026-06-10"
notes = "Add C-RUN-OUTPUT: content-addressed measurement identity + reuse (incremental sweeps), execution-environment isolation, and a per-result-set manifest"

[[changelog]]
version = "0.4.0"
date = "2026-06-09"
notes = "C-QUALITY-GATE: accuracy-invariant/active candidate classification — searches varying only accuracy-invariant args MAY skip per-config gating (baseline + extreme-value spot-check); C-MEASUREMENT records the accuracy-gate result + pass/fail flag"

[[changelog]]
version = "0.3.0"
date = "2026-06-09"
notes = "Tighten C-QUALITY-GATE: accuracy gate filters eligibility at every search stage (OFAT pinning, focused-grid admission, final results); failing configs recorded and flagged in the measurement stream for trade-off inspection, never promoted into the acceptable results"

[[changelog]]
version = "0.2.0"
date = "2026-06-09"
notes = "Decode-first objective; TTFT becomes non-gating; workload cost-role staging"
added = ["C-WORKLOAD-STAGING — short-output workloads drive the search; long-output workloads reserved for final-report characterization"]
changed = [
    "C-OBJECTIVE — decode latency/throughput is the first-class objective and the sole SLO gate; TTFT is now a reported, non-gating metric",
    "C-OBJECTIVE — throughput axis is steady-state decode throughput tagged with context length, not OSL-averaged",
]

[[changelog]]
version = "0.1.0"
date = "2026-06-09"
notes = "Initial draft"
